services:
  - type: web
    name: arf-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arf-db
          property: connectionString
      - key: API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
databases:
  - name: arf-db
    databaseName: arf
    user: arf_user
